name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        # Version comes from package.json's `packageManager` field, so CI and
        # local dev run the same pinned Bun instead of drifting on `latest`.
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run build checks
        run: bun run check:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        # Version comes from package.json's `packageManager` field, so CI and
        # local dev run the same pinned Bun instead of drifting on `latest`.
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        shell: bash
        # xvfb gives the headed Firefox project a virtual display, the only
        # way Firefox gets (software) WebGL on a GPU-less runner. Chromium and
        # WebKit stay headless and are unaffected by the wrapper.
        run: |
          set -o pipefail
          command -v xvfb-run >/dev/null || sudo apt-get install -y -qq xvfb
          xvfb-run --auto-servernum bun run check:test 2>&1 | tee pw.log

      # Annotations are readable via the public API even when raw step logs
      # require admin auth — surface the failure tail where it can be seen.
      - name: Surface failure tail as annotation
        if: failure()
        shell: bash
        run: |
          tailtxt=$(tail -c 1800 pw.log | tr -d '\r')
          tailtxt="${tailtxt//'%'/%25}"
          tailtxt="${tailtxt//$'\n'/%0A}"
          echo "::error title=Playwright failure tail::$tailtxt"

  deploy:
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
